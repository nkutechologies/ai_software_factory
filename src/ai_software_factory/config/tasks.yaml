# AI Software Factory Pipeline - Task Definitions
# All code-producing agents write REAL files to output/project/ using file_writer tool.
# Shell commands run in output/project/ by default.

# 1 - Requirement Agent Task
requirement_task:
  description: >
    Convert the following project idea into a formal Software Requirement
    Specification (SRS) document following IEEE 830 standard format:

    Project Idea: {project_idea}

    The SRS document MUST include ALL of the following sections:

    1. INTRODUCTION
       1.1 Purpose
       1.2 Scope
       1.3 Definitions, Acronyms, and Abbreviations
       1.4 References
       1.5 Overview of document structure

    2. OVERALL DESCRIPTION
       2.1 Product Perspective
       2.2 Product Functions
       2.3 User Roles and Characteristics
       2.4 Constraints
       2.5 Assumptions and Dependencies

    3. SPECIFIC REQUIREMENTS
       3.1 Functional Requirements - numbered FR-001, FR-002, etc.
       3.2 Non-Functional Requirements
       3.3 External Interface Requirements

    4. SYSTEM MODELS
       4.1 Use Case Descriptions
       4.2 Data Entities with attributes
       4.3 System Modules

    5. API SPECIFICATION
       5.1 API Endpoints - method, path, request body, response, status codes
       5.2 Authentication requirements

    6. APPENDIX
       6.1 Traceability Matrix

    Be thorough. Each functional requirement must have clear acceptance criteria.
  expected_output: >
    A complete SRS document in markdown following IEEE 830 structure.
  agent: requirement_analyst

# 2 - Architecture Agent Task
architecture_task:
  description: >
    Based on the SRS document provided, design a complete technical system
    architecture. Include:

    1. Architecture Style (Modular Monolith recommended for simplicity)
    2. Services/Modules with responsibilities
    3. Database Tables with all columns and types
    4. Technology Stack: Node.js, Express, PostgreSQL (Neon hosted), vanilla JS + Tailwind CSS CDN
    5. API Design - detailed endpoint specifications with request/response

    IMPORTANT: The tech stack MUST be:
    - Backend: Node.js + Express
    - Database: PostgreSQL (hosted on Neon)
    - Frontend: Vanilla JavaScript + HTML + Tailwind CSS (via CDN, no build step)
    - Deployment: Vercel (serverless)
  expected_output: >
    A structured architecture document in markdown with sections for
    Architecture Style, Services, Database Tables with columns, Tech Stack,
    and API Design.
  agent: architecture_agent

# 3 - Planning Agent Task
planning_task:
  description: >
    Based on the architecture document, create a detailed task breakdown
    as a JSON task list. Each task must specify:
    - id: task identifier (T1, T2, etc.)
    - agent: which specialist handles it (database_engineer,
      backend_developer, frontend_developer)
    - task: clear description of what to implement
    - files: list of files to create
    - depends_on: task IDs this depends on

    IMPORTANT: Plan for REAL files to be written with file_writer tool:
    - database_engineer creates: database/schema.sql, database/seed.sql, db.js
    - backend_developer creates: package.json, server.js, routes/*.js
    - frontend_developer creates: public/index.html, public/js/app.js
  expected_output: >
    A valid JSON object with a tasks array. Each task has id, agent, task,
    files, and depends_on fields. Ordered: database first, backend, frontend.
  agent: planning_agent

# 4 - Database Engineer Task
database_task:
  description: >
    You MUST use the file_writer and shell_command tools to create a REAL
    hosted database. Do NOT just write documentation.

    STEP 1 - Write SQL schema file:
    Use file_writer to create "database/schema.sql" with:
    - DROP TABLE IF EXISTS statements (CASCADE)
    - CREATE TABLE statements for all entities from the architecture
    - Proper data types, PRIMARY KEY, FOREIGN KEY, NOT NULL, CHECK constraints
    - CREATE INDEX statements for frequently queried columns

    STEP 2 - Write seed data file:
    Use file_writer to create "database/seed.sql" with:
    - INSERT statements with realistic sample data (at least 5 rows per table)

    STEP 3 - Create Neon hosted database:
    Use shell_command to run:
      neonctl projects create --name {project_name} --org-id org-summer-term-90668608 --output json
    Parse the connection_uri from the output.
    If a project already exists you can list with: neonctl projects list --org-id org-summer-term-90668608

    STEP 4 - Run schema against Neon:
    Use shell_command to run the SQL against the database:
      psql "CONNECTION_URI_FROM_STEP3" -f database/schema.sql
    Then run seed data:
      psql "CONNECTION_URI_FROM_STEP3" -f database/seed.sql

    If psql is not available, use: neonctl sql --project-id PROJECT_ID -f database/schema.sql

    STEP 5 - Write db.js connection module:
    Use file_writer to create "db.js" with:
      const Pool = require pg Pool
      require dotenv config
      const pool = new Pool with connectionString from process.env.DATABASE_URL
      and ssl rejectUnauthorized false
      Export connectDB function and pool

    STEP 6 - Write .env file:
    Use file_writer to create ".env" with:
      DATABASE_URL=the_connection_uri_from_step3
      PORT=3000

    Your final answer MUST include the DATABASE_URL connection string.
  expected_output: >
    A report with: the Neon project details, DATABASE_URL connection string,
    confirmation that schema and seed data were executed successfully,
    and list of files created.
  agent: database_engineer

# 5 - Backend Developer Task
backend_task:
  description: >
    You MUST use the file_writer tool to create REAL working backend code files.
    Do NOT write markdown documentation. Write actual .js files.

    Create ALL of these files using file_writer:

    FILE 1 - "package.json":
    Create with name, version, description, main server.js,
    scripts start node server.js and db:init node scripts/init-db.js,
    dependencies: express, pg, cors, dotenv,
    engines node >=18

    FILE 2 - "server.js":
    Create the Express server that:
    - requires dotenv config
    - imports express cors path
    - imports connectDB from ./db
    - imports route modules from ./routes/
    - Sets up cors() and express.json() middleware
    - Calls connectDB()
    - Mounts API routes: /api/students, /api/attendance, /api/reports, /api/teachers
    - Adds GET /api/health returning status ok and timestamp
    - Serves static files from public/
    - SPA fallback for all other routes
    - Error handling middleware
    - Listens on process.env.PORT or 3000
    - module.exports = app

    FILE 3 - Create route files in routes/ for each resource:
    Each route file should have proper Express router with:
    - GET list all, GET by id, POST create, DELETE
    - Parameterized queries using pool.query with $1 $2 etc
    - Proper error handling with next(err)
    - Input validation returning 400 for missing fields

    FILE 4 - Install dependencies:
    Use shell_command: npm install

    Your code MUST use parameterized queries (not string concatenation)
    to prevent SQL injection. Include proper error handling.
  expected_output: >
    List of all files created with file_writer, confirmation that npm install
    succeeded, and the complete API endpoint list.
  agent: backend_developer

# 6 - Frontend Developer Task
frontend_task:
  description: >
    You MUST use the file_writer tool to create REAL working frontend files.
    Do NOT write markdown. Write actual HTML and JavaScript files.

    IMPORTANT: Use vanilla JavaScript and Tailwind CSS via CDN.
    NO React, NO build step, NO npm frontend packages.

    FILE 1 - "public/index.html":
    Create a professional, modern single-page app with:
    - Tailwind CSS loaded via script tag: https://cdn.tailwindcss.com
    - Clean navigation with tabs for each feature
    - Professional color scheme (blue primary, green success, red danger)
    - Responsive layout that works on mobile and desktop
    - All sections/pages as divs toggled by JavaScript
    - Link to /js/app.js script

    The HTML should include these sections:
    a) Dashboard - stats cards showing totals, present/absent counts, attendance rate
    b) Main feature pages based on the SRS requirements
    c) Data management pages with tables, add/edit forms
    d) Reports page with date filters and summary tables

    FILE 2 - "public/js/app.js":
    Create the JavaScript with:
    - Tab switching function
    - API helper functions using fetch() for GET, POST, DELETE
    - Functions to load and display data in tables
    - Form submission handlers
    - escapeHtml utility function for XSS prevention
    - DOMContentLoaded init that loads dashboard data
    - All API calls use relative paths like /api/students

    Make the UI look PROFESSIONAL:
    - Rounded cards with subtle shadows
    - Color-coded badges (green for positive, red for negative)
    - Clean table styling with striped rows
    - Proper spacing and typography
    - Loading states and error messages
  expected_output: >
    List of frontend files created with file_writer,
    description of the UI features implemented.
  agent: frontend_developer

# 7 - QA Engineer Task
qa_task:
  description: >
    Use shell_command to start the local server and test ALL API endpoints
    with curl. The project is at output/project/.

    STEP 1 - Start the server in background:
    Use shell_command: cd output/project && PORT=4000 node server.js &
    Wait a moment, then test endpoints.

    STEP 2 - Test each endpoint with curl:
    For each API endpoint, run curl and check the response.
    Test at least:
    - GET /api/health
    - GET /api/students
    - POST creating a new record
    - GET a specific record
    - DELETE a record
    - Any other endpoints defined in the routes

    STEP 3 - Stop the server:
    Use shell_command: kill $(lsof -ti:4000) 2>/dev/null

    Report pass/fail for each endpoint tested.
  expected_output: >
    A test report with each endpoint tested, the HTTP method,
    the response received, and pass/fail status.
  agent: qa_engineer

# 8 - Evaluation Engine Task
evaluation_task:
  description: >
    Review ALL generated code in output/project/ and the QA test results.
    Score each dimension 1-10:

    1. Code Quality - clean code, best practices, naming conventions
    2. Test Results - did all API endpoints pass testing?
    3. Security Score - SQL injection prevention, input validation, XSS prevention
    4. Architecture Compliance - does code match the architecture design?
    5. Completeness - are all SRS requirements implemented?

    For each dimension, provide the score and specific findings.
  expected_output: >
    A JSON evaluation report with scores for each dimension,
    an overall_score average, and pass/fail recommendation.
  agent: evaluation_engine

# 9 - Git Integration Task
git_integration_task:
  description: >
    Use shell_command to push the project to GitHub.

    STEP 1 - Create .gitignore:
    Use file_writer to create ".gitignore" with:
    node_modules/
    .env
    .vercel/
    .DS_Store

    STEP 2 - Initialize git and commit:
    Use shell_command:
      git init
      git add -A
      git commit -m "feat: complete full-stack app generated by AI Software Factory"

    STEP 3 - Create GitHub repo:
    Use shell_command:
      gh repo create nkutechologies/{project_name} --public --source=. --push

    If the repo already exists, just set remote and push:
      git remote add origin https://github.com/nkutechologies/{project_name}.git
      git push -u origin main --force

    Your answer MUST include the GitHub URL.
  expected_output: >
    GitHub repository URL and confirmation that code was pushed successfully.
  agent: git_integration_agent

# 10 - Deployment Task
deployment_task:
  description: >
    Deploy the project from output/project/ to Vercel with the DATABASE_URL
    environment variable.

    STEP 1 - Create vercel.json:
    Use file_writer to create "vercel.json" with:
    version 2, builds with server.js using @vercel/node and public/** using @vercel/static,
    routes: /api/* to server.js, static file patterns to public/, fallback to server.js

    STEP 2 - Set environment variable:
    Use shell_command to add DATABASE_URL to Vercel:
      npx vercel env add DATABASE_URL production <<< "THE_DATABASE_URL_VALUE"
    Get the DATABASE_URL from the .env file in the project.

    STEP 3 - Deploy:
    Use shell_command:
      npx vercel deploy --prod --yes --token=$VERCEL_TOKEN

    STEP 4 - Verify deployment:
    Use shell_command to test the live URL with curl:
      curl -s https://THE_DEPLOYED_URL/api/health

    Your final answer MUST include:
    - DEPLOYED_URL: the live Vercel URL
    - Confirmation that the health endpoint returns status ok
  expected_output: >
    DEPLOYED_URL: the live Vercel URL.
    Verification that the app is working (health check passed).
    Any environment variables that were set.
  agent: deployment_agent
